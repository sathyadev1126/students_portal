{% extends 'base.html' %}

{% block content %}

<h2 class="mb-4">{{ topic.name }} Test</h2>

<form method="POST">
{% csrf_token %}

{% for question in questions %}

<div class="card shadow mb-3">
<div class="card-body">

<h5 class="mb-3">
Question {{ forloop.counter }}:
{{ question.question_text }}
</h5>

<div class="form-check">
<input class="form-check-input" type="radio" name="{{ question.id }}" value="A">
<label class="form-check-label">
{{ question.option_a }}
</label>
</div>

<div class="form-check">
<input class="form-check-input" type="radio" name="{{ question.id }}" value="B">
<label class="form-check-label">
{{ question.option_b }}
</label>
</div>

<div class="form-check">
<input class="form-check-input" type="radio" name="{{ question.id }}" value="C">
<label class="form-check-label">
{{ question.option_c }}
</label>
</div>

<div class="form-check">
<input class="form-check-input" type="radio" name="{{ question.id }}" value="D">
<label class="form-check-label">
{{ question.option_d }}
</label>
</div>

</div>
</div>

{% endfor %}

<div class="text-center">
<button type="submit" class="btn btn-success btn-lg">
Submit Test
</button>
</div>

</form>

{% endblock %}
