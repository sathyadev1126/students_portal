{% extends 'base.html' %}

{% block content %}

<h2 class="mb-4">Company Mock Tests</h2>

<div class="row">

{% for company in companies %}

<div class="col-md-4">

<div class="card shadow mb-4 text-center">

<div class="card-body">

<h5 class="card-title">{{ company.name }}</h5>

<p class="text-muted">Practice aptitude test for {{ company.name }}</p>

<a href="{% url 'company_start_test' company.id %}" class="btn btn-primary">
Start Test
</a>

</div>

</div>

</div>

{% endfor %}

</div>

<div class="mt-3">
<a href="{% url 'dashboard' %}" class="btn btn-secondary">
Back to Dashboard
</a>
</div>

{% endblock %}
